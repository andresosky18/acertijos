<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>¡Bienvenido/a!</h1>
        <p>Selecciona tus datos para comenzar</p>
        
        <select id="countrySelect">
            <option value="" disabled selected>Elige un país</option>
            <option value="usa">USA</option>
            <option value="colombia">Colombia</option>
            <option value="mexico">México</option>
            <option value="peru">Perú</option>
            <option value="republica-dominicana">República Dominicana</option>
            <option value="ecuador">Ecuador</option>
            <option value="guatemala">Guatemala</option>
            <option value="honduras">Honduras</option>
            <option value="el-salvador">El Salvador</option>
            <option value="espana">España</option>
        </select>

        <select id="areaSelect">
            <option value="" disabled selected>Elige tu área</option>
            <option value="Gerencia y directivos">Gerencia y directivos</option>
            <option value="Financiero">Financiero</option>
            <option value="Innovación">Innovación</option>
            <option value="Comercial">Comercial</option>
            <option value="Operaciones">Operaciones</option>
        </select>

        <button class="send-button" id="btnStart">Comenzar</button>
    </div>

    <script>
        document.getElementById('btnStart').onclick = () => {
            const country = document.getElementById('countrySelect').value;
            const area = document.getElementById('areaSelect').value;
            if (country && area) {
                window.location.href = `adivinanza.html?country=${country}&area=${encodeURIComponent(area)}`;
            } else {
                alert('Selecciona país y área');
            }
        };
    </script>
</body>
</html>
