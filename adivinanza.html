<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivinanza OSAC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="riddle-container">
        <div id="welcomeScreen" style="width:100%; display: flex; flex-direction: column; align-items: center;">
            <h1>¡Bienvenido/a!</h1>
            <p>Resuelve los acertijos y guarda bien tu pista. La necesitarás pronto.</p>
            <button class="primary-button" id="btnGo">Comenzar</button>
        </div>

        <div id="gameScreen" style="display:none; width:100%; flex-direction: column; align-items: center;">
            <p id="riddleCounter" style="color: #007aff; font-weight: 800; margin-bottom: 5px; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px;"></p>
            
            <p id="qText" style="font-weight:600; text-align: center; margin-bottom: 25px; line-height: 1.8;"></p>
            <div id="options" class="options-group" style="width: 100%;"></div>
            
            <p id="msg" style="height:20px; font-size:0.9em; margin-bottom:10px; font-weight: 600;"></p>
            <button class="primary-button" id="btnCheck">Validar Respuesta</button>
        </div>

        <div id="surveyScreen" style="display:none; width:100%; flex-direction: column; align-items: center;">
            <h2>¡Excelente!</h2>
            <p>Antes de tu letra, danos tu opinión:</p>
            <div class="options-group" style="text-align: left;">
                <label>1. ¿Qué tan claro tienes qué significa una buena experiencia de cliente?</label>
                <select id="s1">
                    <option value="" disabled selected>Selecciona una opción...</option>
                    <option value="Muy claro">Muy claro</option>
                    <option value="Claro">Claro</option>
                    <option value="Poco claro">Poco claro</option>
                    <option value="Nada claro">Nada claro</option>
                </select>

                <label>2. ¿Con qué frecuencia piensas en tu impacto al cliente?</label>
                <select id="s2">
                    <option value="" disabled selected>Selecciona una opción...</option>
                    <option value="Siempre">Siempre</option>
                    <option value="Frecuentemente">Frecuentemente</option>
                    <option value="Ocasionalmente">Ocasionalmente</option>
                    <option value="Casi nunca">Casi nunca</option>
                </select>
            </div>
            <button class="primary-button" id="btnFinish">Ver mi Letra</button>
        </div>

        <div id="winScreen" style="display:none; width:100%; flex-direction: column; align-items: center;">
            <h2>¡Lo lograste!</h2>
            <div id="secretLetterDisplay"></div>
            <p>Guárdala bien. Pronto sabrás por qué.</p>
            <a href="index.html" class="primary-button">Inicio</a>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzhrkxgu1uPN-6RrhYtzjcdJ_lGwMeg109zQtJlhTRDaDWY9VtcucK8iOA-CW0_L5hM/exec";
        
        const params = new URLSearchParams(window.location.search);
        const country = params.get('country') || 'usa';
        const area = params.get('area') || 'No especificado';
        
        const configMap = { 
            usa: 'O', colombia: 'S', mexico: 'A', peru: 'C', 
            "republica-dominicana": 'O', ecuador: 'S', guatemala: 'A', 
            honduras: 'C', "el-salvador": 'O', espana: 'S' 
        };

        const riddles = [
            { 
                q: "No se enseña en manuales,<br>pero se nota en cada llamada.<br>Cuando aparece, el cliente confía<br>y el problema nunca se escapa.<br><br>¿Qué soy?", 
                a: "C", 
                opts: ["Un procedimiento", "Un sistema", "Una actitud de servicio", "Un guion de atención"] 
            },
            { 
                q: "No se ve, pero se siente.<br>No se receta, pero cura.<br>Se contagia rápido en el equipo<br>y el cliente siempre lo nota.<br><br>¿Qué es?", 
                a: "C", 
                opts: ["Un protocolo de atención", "Una herramienta tecnológica", "La cultura de servicio", "Un indicador de desempeño"] 
            },
            { 
                q: "Cuando el día es difícil, aparece.<br>No grita, no corre, pero resuelve.<br>Escucha antes de responder<br>y no se va hasta ayudar.<br><br>¿De qué hablamos?", 
                a: "D", 
                opts: ["Un jefe", "Un proceso", "Un reclamo", "El compromiso con el cliente"] 
            }
        ];

        let currentRiddleIndex = 0;
        let respuestasAdivinanzas = [];

        function renderRiddle(index) {
            const r = riddles[index];
            document.getElementById('riddleCounter').textContent = `Adivinanza ${index + 1} de ${riddles.length}`;
            document.getElementById('qText').innerHTML = r.q;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = ''; 
            
            r.opts.forEach((o, i) => {
                const char = String.fromCharCode(65 + i);
                optionsDiv.innerHTML += `
                    <label class="option-item">
                        <input type="radio" name="ans" value="${char}"> 
                        <span>${char}. ${o}</span>
                    </label>`;
            });

            document.getElementById('msg').textContent = '';
        }

        document.getElementById('btnGo').onclick = function() {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'flex';
            currentRiddleIndex = 0; 
            respuestasAdivinanzas = []; 
            renderRiddle(currentRiddleIndex);
        };

        document.getElementById('btnCheck').onclick = function() {
            const sel = document.querySelector('input[name="ans"]:checked');
            
            if(!sel) {
                alert("Por favor, selecciona una respuesta para avanzar.");
                return;
            }
            
            if(sel.value === riddles[currentRiddleIndex].a) {
                respuestasAdivinanzas[currentRiddleIndex] = sel.nextElementSibling.textContent.trim();
                currentRiddleIndex++;
                
                if(currentRiddleIndex < riddles.length) {
                    renderRiddle(currentRiddleIndex);
                } else {
                    document.getElementById('gameScreen').style.display = 'none';
                    document.getElementById('surveyScreen').style.display = 'flex';
                }
            } else {
                const msg = document.getElementById('msg');
                msg.textContent = "¡Respuesta incorrecta! Inténtalo de nuevo.";
                msg.style.color = "#d9534f";
            }
        };

        document.getElementById('btnFinish').onclick = function() {
            const p1 = document.getElementById('s1').value;
            const p2 = document.getElementById('s2').value;

            if(p1 === "" || p2 === "") {
                alert("Por favor, contesta ambas preguntas de la encuesta para continuar.");
                return;
            }

            const btn = document.getElementById('btnFinish');
            btn.textContent = "Enviando...";
            btn.disabled = true;

            const r1 = respuestasAdivinanzas[0];
            const r2 = respuestasAdivinanzas[1];
            const r3 = respuestasAdivinanzas[2];

            const finalURL = `${scriptURL}?country=${country}&area=${encodeURIComponent(area)}&p1=${encodeURIComponent(p1)}&p2=${encodeURIComponent(p2)}&r1=${encodeURIComponent(r1)}&r2=${encodeURIComponent(r2)}&r3=${encodeURIComponent(r3)}&status=Completado`;

            const iframe = document.createElement("iframe");
            iframe.style.display = "none";
            iframe.src = finalURL;
            document.body.appendChild(iframe);

            setTimeout(() => {
                document.getElementById('surveyScreen').style.display = 'none';
                document.getElementById('winScreen').style.display = 'flex';
                document.getElementById('secretLetterDisplay').textContent = configMap[country] || '?';
                document.body.removeChild(iframe);
            }, 1200);
        };
    </script>
</body>

</html>
